<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Plano</title>

<link rel="stylesheet" href="css/estilos.css">

</head>

<body>

<div class="menu">

<a href="index.html">Dashboard</a>
<a href="clientes.html">Clientes</a>
<a href="propietarios.html">Propietarios</a>
<a href="planos.html">Planos</a>
<a href="planos_pendientes.html">Pendientes</a>

</div>

<h1>Formulario Plano</h1>

<form id="formPlano">

<div class="form-grid">

<div class="campo">
<label>Fecha</label>
<input type="date" id="fecha">
</div>

<div class="campo">
<label>Cantidad de Planos</label>
<select id="numero_plano" required>

<option value="">Seleccione</option>

<option value="1">1</option>
<option value="2">2</option>
<option value="3">3</option>
<option value="4">4</option>
<option value="5">5</option>
<option value="6">6</option>
<option value="7">7</option>
<option value="8">8</option>
<option value="9">9</option>
<option value="10">10</option>

</select>
</div>

<div class="campo">
<label>Tipo de Plano</label>
<select id="tipo">
<option>Casa</option>
<option>Departamentos</option>
<option>Comercial</option>
<option>Escuela</option>
</select>
</div>


<div class="campo">
<label>Calle</label>
<input type="text" id="calle">
</div>

<div class="campo">
<label>Número</label>
<input type="text" id="numero">
</div>

<div class="campo">
<label>Departamento</label>
<input type="text" id="departamento">
</div>

<div class="campo">
<label>Entre Calle 1</label>
<input type="text" id="entre_calle_1">
</div>

<div class="campo">
<label>Entre Calle 2</label>
<input type="text" id="entre_calle_2">
</div>

<div class="campo">
<label>Entre Calle 3</label>
<input type="text" id="entre_calle_3">
</div>

<div class="campo">
<label>Localidad</label>
<select id="localidad">

<option value="Punta Alta">Punta Alta</option>
<option value="Bahia Blanca">Bahia Blanca</option>
<option value="Sierra de la Ventana">Sierra de la Ventana</option>
<option value="Monte Hermoso">Monte Hermoso</option>

</select>
</div>

<div class="campo">
<label>Cliente (Gasista)</label>
<select id="id_cliente"></select>
</div>

<div class="campo">
<label>Propietario</label>
<select id="id_propietario">
<option value="">Sin propietario</option>
</select>
</div>

<div class="campo">
<label>Precio</label>
<input type="text" id="precio" readonly>
</div>

<div class="campo">
<label>Monto Pagado</label>
<input type="text" id="monto_pagado">
</div>

<div class="campo">
<label>Estado</label>
<select id="estado">
<option value="Pendiente">Pendiente</option>
<option value="En proceso">En proceso</option>
<option value="Finalizado">Finalizado</option>
</select>
</div>


<div class="campo observacion">
<label>Observación</label>
<textarea id="observacion"></textarea>
</div>

</div>

<div class="botones">
<button type="submit">Guardar Plano</button>
<button type="button" onclick="volver()">Volver</button>
</div>

</form>

<script src="js/plano_form.js"></script>

</body>
</html>
